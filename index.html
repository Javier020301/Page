<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Information Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fafafa;
        }

        #search-container {
            background-color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #search {
            padding: 10px;
            width: 250px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        #btn_search {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
        }

        #btn_search:hover {
            background-color: #218838;
        }

        #targets {
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="search-container">
        <form>
            <input type="text" id="search" placeholder="Name of the character" required>
            <button type="submit" id="btn_search">Buscar</button>
        </form>
    </div>
    <div id="targets" style="display: flex; flex-wrap: wrap; gap: 20px; padding: 20px;"></div>

    <script src="index.js"></script>
</body>
</html>
