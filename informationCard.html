<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Description</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ffffff;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        #description-container {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
        }

        button[onclick="returnHome()"] {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button[onclick="returnHome()"]:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div id="description-container" style="padding: 20px;"></div>
    <script src="informationCard.js"></script>
    <button type="button" onclick="returnHome()">
        Regresar a la página principal
    </button>
</body>
</html>
