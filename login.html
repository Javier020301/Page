<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f0f2f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            #formlogin {
                background: white;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                width: 300px;
            }

            #myform label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            #myform input {
                width: 100%;
                padding: 8px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
            }

            #btn-submit {
                width: 100%;
                padding: 10px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

            #btn-submit:hover {
                background-color: #0056b3;
            }
        </style>
    </head>
    <body>
        <div id="formlogin">
            <form id="myform">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="User (admin)"><br><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="12345"><br><br>
                <button type="submit" id="btn-submit">Submit</button>
            </form>
        </div>
        <script src="login.js">  
        </script>
    </body>
</html>
